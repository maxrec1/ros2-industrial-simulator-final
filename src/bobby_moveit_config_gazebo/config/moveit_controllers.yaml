# MoveIt uses this configuration for controller management.
# Controller names are bobby-prefixed to match combined_controllers.yaml and avoid
# collision with SCARA's controllers in the shared simulation. move_group runs in
# the global namespace, so these names resolve to
# /bobby_arm_controller/follow_joint_trajectory etc. — the same action servers the
# ros2_control JointTrajectoryControllers expose.

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - bobby_arm_controller
    - bobby_gripper_controller

  bobby_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
  bobby_gripper_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - finger_left_joint
