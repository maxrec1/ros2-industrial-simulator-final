# Used by bobby's gazebo_ros2_control controller_manager (runs at
# /bobby/controller_manager). Node keys are the explicit /bobby/... FQNs: the
# /**/ wildcard matched the controller_manager node but did NOT populate the
# per-controller 'joints'/'command_interfaces' params on the namespaced
# controller nodes (they configured empty and failed). Explicit keys fix that.
# Controller names are bobby-prefixed so they can never collide with SCARA's
# (joint_state_broadcaster / arm_trajectory_controller) in the shared gzserver.
/bobby/controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    bobby_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    bobby_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    bobby_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

/bobby/bobby_arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

/bobby/bobby_gripper_controller:
  ros__parameters:
    joints:
      - finger_left_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
